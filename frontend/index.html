<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Meeting Summariser</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0c0d10;
    --surface: #13151a;
    --surface2: #1a1d25;
    --border: #252830;
    --border2: #2e3140;
    --accent: #7b6ef6;
    --accent2: #5b4fd4;
    --teal: #2dd4bf;
    --amber: #f59e0b;
    --green: #22c55e;
    --red: #ef4444;
    --text: #e8eaf0;
    --text2: #8b8fa8;
    --text3: #555870;
    --mono: 'DM Mono', monospace;
    --sans: 'Syne', sans-serif;
    --body: 'Inter', sans-serif;
    --r: 10px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--body);
    font-size: 14px;
    line-height: 1.6;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── header ── */
  header {
    padding: 20px 32px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--surface);
  }
  .logo-mark {
    width: 32px; height: 32px;
    background: var(--accent);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--sans); font-weight: 800; font-size: 15px; color: #fff;
    flex-shrink: 0;
  }
  header h1 {
    font-family: var(--sans);
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -0.3px;
  }
  .badge {
    margin-left: auto;
    background: #7b6ef622;
    color: var(--accent);
    border: 1px solid #7b6ef644;
    border-radius: 20px;
    padding: 3px 10px;
    font-family: var(--mono);
    font-size: 11px;
  }

  /* ── layout ── */
  .layout {
    display: grid;
    grid-template-columns: 340px 1fr;
    flex: 1;
    overflow: hidden;
  }

  /* ── sidebar ── */
  .sidebar {
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    background: var(--surface);
  }

  .panel-title {
    font-family: var(--sans);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: var(--text3);
    padding: 20px 20px 10px;
  }

  /* ingest section */
  .ingest-section { padding: 0 16px 16px; }
  .tabs { display: flex; gap: 4px; margin-bottom: 12px; }
  .tab {
    flex: 1; padding: 7px;
    background: transparent;
    border: 1px solid var(--border2);
    border-radius: 6px;
    color: var(--text2);
    font-family: var(--body);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .tab.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  .tab-content { display: none; }
  .tab-content.active { display: block; }

  textarea, input[type=text] {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: var(--r);
    color: var(--text);
    font-family: var(--mono);
    font-size: 12px;
    padding: 10px 12px;
    resize: vertical;
    transition: border-color 0.15s;
    outline: none;
  }
  textarea:focus, input[type=text]:focus { border-color: var(--accent); }
  textarea { min-height: 120px; line-height: 1.7; }

  label { display: block; color: var(--text2); font-size: 11px; margin-bottom: 5px; margin-top: 10px; }

  .btn {
    display: block; width: 100%;
    padding: 10px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--r);
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 12px;
    transition: background 0.15s, transform 0.1s;
  }
  .btn:hover { background: var(--accent2); }
  .btn:active { transform: scale(0.98); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .divider { border: none; border-top: 1px solid var(--border); margin: 16px 0; }

  /* meetings list */
  .meetings-list { padding: 0 16px; flex: 1; }
  .meeting-item {
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: var(--r);
    margin-bottom: 8px;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
  }
  .meeting-item:hover { border-color: var(--border2); background: var(--surface2); }
  .meeting-item.selected { border-color: var(--accent); background: #7b6ef611; }
  .meeting-item-title {
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 3px;
  }
  .meeting-item-meta {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text3);
  }

  /* ── main panel ── */
  .main {
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* query bar */
  .query-bar {
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 10px;
    background: var(--surface);
  }
  .query-bar input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: var(--r);
    color: var(--text);
    font-family: var(--body);
    font-size: 14px;
    padding: 10px 16px;
    outline: none;
    transition: border-color 0.15s;
  }
  .query-bar input:focus { border-color: var(--accent); }
  .query-bar .btn { width: auto; padding: 10px 24px; margin: 0; }

  /* content area */
  .content {
    display: grid;
    grid-template-columns: 1fr 300px;
    flex: 1;
    overflow: hidden;
  }

  .output-panel {
    padding: 24px;
    overflow-y: auto;
  }

  /* agent trace panel */
  .trace-panel {
    border-left: 1px solid var(--border);
    background: var(--surface);
    overflow-y: auto;
    display: flex;
    flex-direction: column;
  }
  .trace-header {
    padding: 16px 16px 8px;
    border-bottom: 1px solid var(--border);
    font-family: var(--sans);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text3);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .trace-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--text3);
  }
  .trace-dot.active { background: var(--green); animation: pulse 1.2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  .trace-steps { padding: 12px; flex: 1; }

  .trace-step {
    display: flex;
    gap: 10px;
    margin-bottom: 16px;
    opacity: 0;
    transform: translateY(6px);
    animation: fadeUp 0.3s forwards;
  }
  @keyframes fadeUp { to { opacity: 1; transform: none; } }

  .step-line {
    display: flex;
    flex-direction: column;
    align-items: center;
    flex-shrink: 0;
  }
  .step-node {
    width: 22px; height: 22px;
    border-radius: 50%;
    border: 2px solid var(--border2);
    display: flex; align-items: center; justify-content: center;
    font-size: 9px;
    font-family: var(--mono);
    color: var(--text3);
    background: var(--surface2);
    flex-shrink: 0;
  }
  .step-node.done { border-color: var(--green); color: var(--green); background: #22c55e11; }
  .step-node.active { border-color: var(--accent); color: var(--accent); background: #7b6ef611; animation: pulse 1s infinite; }
  .step-connector {
    width: 1px; background: var(--border); flex: 1;
    margin: 2px 0; min-height: 10px;
  }

  .step-content { flex: 1; }
  .step-name {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--accent);
    font-weight: 500;
    margin-bottom: 2px;
  }
  .step-detail {
    font-size: 11px;
    color: var(--text2);
    line-height: 1.5;
  }

  /* output cards */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 12px;
    color: var(--text3);
  }
  .empty-icon {
    width: 48px; height: 48px;
    border: 1px solid var(--border2);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    color: var(--text3);
  }
  .empty-state p { font-size: 13px; text-align: center; max-width: 200px; line-height: 1.5; }

  .result-type-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 12px;
    border-radius: 20px;
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 500;
    margin-bottom: 20px;
  }
  .rt-summary { background: #7b6ef622; color: var(--accent); border: 1px solid #7b6ef644; }
  .rt-action_items { background: #f59e0b22; color: var(--amber); border: 1px solid #f59e0b44; }
  .rt-decisions { background: #2dd4bf22; color: var(--teal); border: 1px solid #2dd4bf44; }
  .rt-qa, .rt-general { background: #22c55e22; color: var(--green); border: 1px solid #22c55e44; }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--r);
    padding: 20px;
    margin-bottom: 16px;
  }
  .card-title {
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 700;
    color: var(--text2);
    letter-spacing: 0.5px;
    margin-bottom: 14px;
    text-transform: uppercase;
    font-size: 10px;
  }

  .tldr {
    font-family: var(--sans);
    font-size: 17px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.5;
    border-left: 3px solid var(--accent);
    padding-left: 14px;
    margin-bottom: 8px;
  }

  .key-points { list-style: none; }
  .key-points li {
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
    color: var(--text);
    font-size: 13px;
    display: flex;
    gap: 10px;
  }
  .key-points li:last-child { border-bottom: none; }
  .kp-dot { color: var(--accent); flex-shrink: 0; margin-top: 2px; }

  .action-item {
    padding: 12px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 8px;
  }
  .action-task { font-size: 13px; color: var(--text); margin-bottom: 6px; font-weight: 500; }
  .action-meta { display: flex; gap: 12px; flex-wrap: wrap; }
  .action-tag {
    font-family: var(--mono);
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 4px;
  }
  .tag-owner { background: #7b6ef622; color: var(--accent); }
  .tag-deadline { background: #f59e0b22; color: var(--amber); }

  .decision-item {
    padding: 12px;
    background: var(--surface2);
    border-left: 3px solid var(--teal);
    border-radius: 0 8px 8px 0;
    margin-bottom: 10px;
  }
  .decision-desc { font-size: 13px; color: var(--text); margin-bottom: 4px; }
  .decision-ctx { font-size: 11px; color: var(--text2); }

  .qa-answer {
    font-size: 14px;
    line-height: 1.75;
    color: var(--text);
    white-space: pre-wrap;
  }

  .sources { margin-top: 16px; }
  .source-item {
    padding: 8px 12px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    margin-bottom: 6px;
    font-size: 11px;
    font-family: var(--mono);
  }
  .source-speaker { color: var(--accent); }
  .source-time { color: var(--teal); margin-left: 8px; }
  .source-preview { color: var(--text2); margin-top: 3px; font-size: 10px; }

  /* loading shimmer */
  .shimmer {
    background: linear-gradient(90deg, var(--surface2) 25%, var(--border) 50%, var(--surface2) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.4s infinite;
    border-radius: 6px;
    height: 16px;
    margin-bottom: 10px;
  }
  @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
  .shimmer.tall { height: 80px; }

  .status-bar {
    padding: 6px 24px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text3);
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .status-ok { color: var(--green); }

  .quick-queries {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    padding: 10px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
  }
  .quick-q {
    padding: 5px 12px;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 20px;
    color: var(--text2);
    font-size: 11px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .quick-q:hover { border-color: var(--accent); color: var(--accent); background: #7b6ef611; }
</style>
</head>
<body>

<header>
  <div class="logo-mark">M</div>
  <h1>Meeting Summariser</h1>
  <span class="badge">Gemma 4 · LangGraph</span>
</header>

<div class="layout">

  <!-- ── SIDEBAR ── -->
  <div class="sidebar">
    <div class="panel-title">Ingest Meeting</div>
    <div class="ingest-section">
      <div class="tabs">
        <button class="tab active" onclick="switchTab('text')">Transcript</button>
        <button class="tab" onclick="switchTab('audio')">Audio</button>
      </div>

      <div class="tab-content active" id="tab-text">
        <label>Paste transcript</label>
        <textarea id="transcript-text" placeholder="Alice: Let's kick off the Q4 planning meeting...&#10;Bob: Sure. First item on the agenda is budget..." rows="8"></textarea>
        <label>Meeting title</label>
        <input type="text" id="text-title" placeholder="e.g. Q4 Planning · Oct 2024"/>
        <label>Attendees (comma-separated)</label>
        <input type="text" id="text-attendees" placeholder="Alice, Bob, Carol"/>
        <button class="btn" id="ingest-text-btn" onclick="ingestText()">Ingest Transcript</button>
      </div>

      <div class="tab-content" id="tab-audio">
        <label>Audio file (.mp3, .wav)</label>
        <input type="file" id="audio-file" accept="audio/*" style="color:var(--text2);font-size:12px;margin-bottom:8px;"/>
        <label>Meeting title</label>
        <input type="text" id="audio-title" placeholder="Sprint Retro · Week 42"/>
        <button class="btn" id="ingest-audio-btn" onclick="ingestAudio()">Transcribe &amp; Ingest</button>
      </div>
    </div>

    <hr class="divider"/>
    <div class="panel-title">Meetings</div>
    <div class="meetings-list" id="meetings-list">
      <div style="color:var(--text3);font-size:12px;padding:8px 0;">No meetings yet. Ingest one above.</div>
    </div>
  </div>

  <!-- ── MAIN ── -->
  <div class="main">
    <div class="query-bar">
      <input type="text" id="query-input" placeholder="Ask anything about this meeting…" onkeydown="if(event.key==='Enter')runQuery()" disabled/>
      <button class="btn" id="query-btn" onclick="runQuery()" disabled>Ask</button>
    </div>

    <div class="quick-queries" id="quick-queries" style="display:none">
      <button class="quick-q" onclick="setQuery('Summarise this meeting')">📋 Summarise</button>
      <button class="quick-q" onclick="setQuery('What are the action items?')">✅ Action items</button>
      <button class="quick-q" onclick="setQuery('What decisions were made?')">🎯 Decisions</button>
      <button class="quick-q" onclick="setQuery('Who was responsible for what?')">👤 Ownership</button>
      <button class="quick-q" onclick="setQuery('What were the main blockers discussed?')">🚧 Blockers</button>
    </div>

    <div class="content">
      <div class="output-panel" id="output-panel">
        <div class="empty-state" id="empty-state">
          <div class="empty-icon">🎙</div>
          <p>Ingest a meeting transcript, then ask a question</p>
        </div>
      </div>

      <!-- ── AGENT TRACE ── -->
      <div class="trace-panel">
        <div class="trace-header">
          <div class="trace-dot" id="trace-dot"></div>
          LangGraph Trace
        </div>
        <div class="trace-steps" id="trace-steps">
          <div style="color:var(--text3);font-size:11px;padding:8px 0;">Agent steps appear here when you run a query.</div>
        </div>
      </div>
    </div>

    <div class="status-bar">
      <span id="status-text">Ready</span>
      <span id="meeting-id-display" style="margin-left:auto"></span>
    </div>
  </div>
</div>

<script>
const API = 'http://localhost:8000/api/v1';
let activeMeetingId = null;
let meetings = [];

// ── tab switching ──────────────────────────────────────────────────────────
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t,i) => {
    t.classList.toggle('active', (i===0&&tab==='text')||(i===1&&tab==='audio'));
  });
  document.getElementById('tab-text').classList.toggle('active', tab==='text');
  document.getElementById('tab-audio').classList.toggle('active', tab==='audio');
}

// ── ingest text ────────────────────────────────────────────────────────────
async function ingestText() {
  const text = document.getElementById('transcript-text').value.trim();
  const title = document.getElementById('text-title').value.trim() || 'Untitled Meeting';
  const attendees = document.getElementById('text-attendees').value.split(',').map(s=>s.trim()).filter(Boolean);

  if (!text) return alert('Please paste a transcript.');
  setStatus('Ingesting…');
  toggleBtn('ingest-text-btn', true);

  try {
    const res = await fetch(`${API}/ingest/text`, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ text, title, attendees })
    });
    if (!res.ok) throw new Error(await res.text());
    const data = await res.json();
    addMeeting(data.meeting_id, data.title);
    setStatus(`✓ Ingested "${data.title}"`);
    document.getElementById('transcript-text').value = '';
  } catch(e) {
    // Demo mode: simulate for UI demo when API not running
    const demoId = 'demo-' + Math.random().toString(36).slice(2,10);
    addMeeting(demoId, title || 'Demo Meeting');
    setStatus('Demo mode — API not connected');
  } finally {
    toggleBtn('ingest-text-btn', false);
  }
}

// ── ingest audio ───────────────────────────────────────────────────────────
async function ingestAudio() {
  const file = document.getElementById('audio-file').files[0];
  const title = document.getElementById('audio-title').value.trim() || 'Audio Meeting';
  if (!file) return alert('Select an audio file first.');

  setStatus('Transcribing audio…');
  toggleBtn('ingest-audio-btn', true);

  try {
    const fd = new FormData();
    fd.append('file', file);
    fd.append('title', title);
    const res = await fetch(`${API}/ingest/audio`, { method:'POST', body:fd });
    if (!res.ok) throw new Error(await res.text());
    const data = await res.json();
    addMeeting(data.meeting_id, data.title);
    setStatus(`✓ Ingested "${data.title}"`);
  } catch(e) {
    setStatus('Audio ingestion failed — check API connection');
  } finally {
    toggleBtn('ingest-audio-btn', false);
  }
}

// ── add meeting to sidebar ─────────────────────────────────────────────────
function addMeeting(id, title) {
  meetings.push({ id, title, ts: new Date() });
  renderMeetings();
  selectMeeting(id, title);
}

function renderMeetings() {
  const el = document.getElementById('meetings-list');
  if (!meetings.length) {
    el.innerHTML = '<div style="color:var(--text3);font-size:12px;padding:8px 0;">No meetings yet.</div>';
    return;
  }
  el.innerHTML = meetings.map(m => `
    <div class="meeting-item ${m.id===activeMeetingId?'selected':''}" onclick="selectMeeting('${m.id}','${m.title}')">
      <div class="meeting-item-title">${m.title}</div>
      <div class="meeting-item-meta">${m.id} · ${m.ts.toLocaleTimeString()}</div>
    </div>
  `).join('');
}

function selectMeeting(id, title) {
  activeMeetingId = id;
  renderMeetings();
  document.getElementById('query-input').disabled = false;
  document.getElementById('query-btn').disabled = false;
  document.getElementById('quick-queries').style.display = 'flex';
  document.getElementById('meeting-id-display').textContent = `Meeting: ${id}`;
  showEmpty();
  clearTrace();
}

// ── query ──────────────────────────────────────────────────────────────────
function setQuery(q) {
  document.getElementById('query-input').value = q;
  runQuery();
}

async function runQuery() {
  if (!activeMeetingId) return;
  const query = document.getElementById('query-input').value.trim();
  if (!query) return;

  setStatus('Running pipeline…');
  toggleBtn('query-btn', true);
  showLoading();
  startTrace();

  try {
    const res = await fetch(`${API}/query`, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ meeting_id: activeMeetingId, query })
    });

    if (!res.ok) throw new Error(await res.text());
    const data = await res.json();

    renderTrace(data.thinking || []);
    renderOutput(data);
    setStatus(`Done · ${data.query_type}`);
  } catch(e) {
    // demo mode — render fake trace + output
    const demoData = buildDemoResponse(query);
    renderTrace(demoData.thinking);
    renderOutput(demoData);
    setStatus('Demo mode — API not connected');
  } finally {
    toggleBtn('query-btn', false);
  }
}

// ── render trace ───────────────────────────────────────────────────────────
function startTrace() {
  document.getElementById('trace-dot').classList.add('active');
  document.getElementById('trace-steps').innerHTML = '<div class="shimmer" style="width:80%"></div><div class="shimmer" style="width:60%"></div>';
}

function clearTrace() {
  document.getElementById('trace-dot').classList.remove('active');
  document.getElementById('trace-steps').innerHTML = '<div style="color:var(--text3);font-size:11px;padding:8px 0;">Agent steps appear here when you run a query.</div>';
}

function renderTrace(steps) {
  document.getElementById('trace-dot').classList.remove('active');
  const el = document.getElementById('trace-steps');
  if (!steps.length) { clearTrace(); return; }

  const nodeColors = {
    classify_query: '#7b6ef6',
    classify_result: '#7b6ef6',
    expand_and_retrieve: '#2dd4bf',
    retrieval_result: '#2dd4bf',
    compress_context: '#f59e0b',
    compression_done: '#f59e0b',
    summary_agent: '#22c55e',
    action_items_agent: '#22c55e',
    decisions_agent: '#22c55e',
    qa_agent: '#22c55e',
  };

  const nodeIcons = {
    classify_query: '⚡',
    classify_result: '⚡',
    expand_and_retrieve: '🔍',
    retrieval_result: '🔍',
    compress_context: '🗜',
    compression_done: '🗜',
    summary_agent: '📋',
    action_items_agent: '✅',
    decisions_agent: '🎯',
    qa_agent: '💬',
  };

  el.innerHTML = steps.map((s, i) => `
    <div class="trace-step" style="animation-delay:${i*0.08}s">
      <div class="step-line">
        <div class="step-node done" style="border-color:${nodeColors[s.step]||'var(--accent)'};color:${nodeColors[s.step]||'var(--accent)'};background:${nodeColors[s.step]||'var(--accent)'}18">
          ${nodeIcons[s.step]||'○'}
        </div>
        ${i < steps.length-1 ? '<div class="step-connector"></div>' : ''}
      </div>
      <div class="step-content">
        <div class="step-name">${s.step}</div>
        <div class="step-detail">${s.detail}</div>
      </div>
    </div>
  `).join('');
}

// ── render output ──────────────────────────────────────────────────────────
function showLoading() {
  const el = document.getElementById('output-panel');
  el.innerHTML = `
    <div class="shimmer" style="width:30%;margin-bottom:20px"></div>
    <div class="shimmer tall"></div>
    <div class="shimmer" style="width:70%;margin-top:12px"></div>
    <div class="shimmer" style="width:55%"></div>
  `;
}

function showEmpty() {
  document.getElementById('output-panel').innerHTML = `
    <div class="empty-state" id="empty-state">
      <div class="empty-icon">🎙</div>
      <p>Ask a question about this meeting</p>
    </div>
  `;
}

function renderOutput(data) {
  const qt = data.query_type || 'general';
  const out = data.output || {};
  const el = document.getElementById('output-panel');

  const typeLabel = { summary:'Summary', action_items:'Action Items', decisions:'Decisions', qa:'Q&A', general:'Answer' };
  const badge = `<span class="result-type-badge rt-${qt}">${typeLabel[qt]||qt}</span>`;

  let html = badge;

  if (qt === 'summary') {
    html += renderSummary(out);
  } else if (qt === 'action_items') {
    html += renderActionItems(out.action_items || []);
  } else if (qt === 'decisions') {
    html += renderDecisions(out.decisions || []);
  } else {
    html += renderQA(out, data.query);
  }

  el.innerHTML = html;
}

function renderSummary(out) {
  const tldr = out.tldr || 'No summary available.';
  const pts = out.key_points || [];
  return `
    <div class="card">
      <div class="card-title">TL;DR</div>
      <div class="tldr">${tldr}</div>
    </div>
    ${pts.length ? `
    <div class="card">
      <div class="card-title">Key Points</div>
      <ul class="key-points">
        ${pts.map(p=>`<li><span class="kp-dot">▸</span>${p}</li>`).join('')}
      </ul>
    </div>` : ''}
  `;
}

function renderActionItems(items) {
  if (!items.length) return '<div class="card"><p style="color:var(--text2);font-size:13px">No action items found in this meeting.</p></div>';
  return `
    <div class="card">
      <div class="card-title">${items.length} Action Items</div>
      ${items.map(item=>`
        <div class="action-item">
          <div class="action-task">${item.task}</div>
          <div class="action-meta">
            ${item.owner ? `<span class="action-tag tag-owner">👤 ${item.owner}</span>` : ''}
            ${item.deadline ? `<span class="action-tag tag-deadline">📅 ${item.deadline}</span>` : ''}
          </div>
        </div>
      `).join('')}
    </div>
  `;
}

function renderDecisions(items) {
  if (!items.length) return '<div class="card"><p style="color:var(--text2);font-size:13px">No decisions found in this meeting.</p></div>';
  return `
    <div class="card">
      <div class="card-title">${items.length} Decisions</div>
      ${items.map(d=>`
        <div class="decision-item">
          <div class="decision-desc">${d.description}</div>
          ${d.context ? `<div class="decision-ctx">${d.context}</div>` : ''}
        </div>
      `).join('')}
    </div>
  `;
}

function renderQA(out, query) {
  const answer = out.answer || out.tldr || JSON.stringify(out, null, 2);
  const sources = out.sources || [];
  return `
    <div class="card">
      <div class="card-title">Answer</div>
      <div class="qa-answer">${answer}</div>
      ${sources.length ? `
        <div class="sources">
          <div class="card-title" style="margin-top:16px;margin-bottom:10px">Sources</div>
          ${sources.map(s=>`
            <div class="source-item">
              <span class="source-speaker">${s.speaker||'Unknown'}</span>
              <span class="source-time">${s.start_time!=null?Math.round(s.start_time)+'s':'—'}</span>
              <div class="source-preview">${(s.text_preview||'').slice(0,100)}…</div>
            </div>
          `).join('')}
        </div>` : ''}
    </div>
  `;
}

// ── helpers ────────────────────────────────────────────────────────────────
function setStatus(msg) { document.getElementById('status-text').textContent = msg; }
function toggleBtn(id, disabled) { document.getElementById(id).disabled = disabled; }

// demo response for when API is offline
function buildDemoResponse(query) {
  const q = query.toLowerCase();
  let query_type = 'qa';
  let output = {};
  let thinking = [
    { step: 'classify_query', detail: `Classifying: "${query.slice(0,60)}"` },
    { step: 'classify_result', detail: `Type=qa | Detected as a direct question about meeting content` },
    { step: 'expand_and_retrieve', detail: 'HyDE expansion + MMR retrieval' },
    { step: 'retrieval_result', detail: 'Retrieved 6 diverse chunks via MMR' },
    { step: 'compress_context', detail: 'Reducing context tokens' },
    { step: 'compression_done', detail: 'Context: 1240 chars' },
  ];

  if (q.includes('summar')) {
    query_type = 'summary';
    thinking[1].detail = 'Type=summary | User wants a meeting overview';
    thinking.push({ step: 'summary_agent', detail: 'Generating meeting TL;DR and key points' });
    output = {
      tldr: 'The team aligned on Q4 priorities, confirmed the product roadmap, and assigned key deliverables to team members with deadlines before end of month.',
      key_points: [
        'Q4 budget of $240k approved — Alice to finalise allocation by Friday',
        'New feature launch pushed to Nov 15 to allow extra QA time',
        'Bob to lead customer interviews for the redesign project',
        'Weekly syncs moved to Tuesdays at 10am starting next week',
        'Carol raised concerns about API rate limits — needs investigation'
      ]
    };
  } else if (q.includes('action')) {
    query_type = 'action_items';
    thinking[1].detail = 'Type=action_items | Extracting tasks and assignments';
    thinking.push({ step: 'action_items_agent', detail: 'Extracting tasks, owners, and deadlines' });
    output = {
      action_items: [
        { task: 'Finalise Q4 budget allocation spreadsheet', owner: 'Alice', deadline: 'This Friday' },
        { task: 'Lead customer discovery interviews for redesign', owner: 'Bob', deadline: 'End of October' },
        { task: 'Investigate API rate limit issues and report back', owner: 'Carol', deadline: 'Next Tuesday' },
        { task: 'Update sprint board with revised launch timeline', owner: 'Dave', deadline: null },
        { task: 'Send updated meeting invite for Tuesday syncs', owner: null, deadline: 'EOD today' },
      ]
    };
  } else if (q.includes('decision')) {
    query_type = 'decisions';
    thinking[1].detail = 'Type=decisions | Identifying confirmed decisions';
    thinking.push({ step: 'decisions_agent', detail: 'Identifying confirmed decisions from discussion' });
    output = {
      decisions: [
        { description: 'Q4 budget of $240,000 approved', context: 'Voted unanimously after reviewing projections', participants: ['Alice', 'Bob', 'Carol'] },
        { description: 'Product launch delayed to November 15', context: 'Extra 2 weeks added for QA and stabilisation', participants: ['Alice', 'Dave'] },
        { description: 'Weekly syncs moved to Tuesdays at 10am', context: 'Conflicts with Monday standups across time zones', participants: ['Full team'] },
      ]
    };
  } else {
    thinking.push({ step: 'qa_agent', detail: `Answering: "${query.slice(0,50)}…"` });
    output = {
      answer: `Based on the meeting transcript, ${query.includes('who') ? 'Alice is the project lead and is responsible for the budget allocation. Bob is handling customer research, and Carol owns the technical investigation.' : 'the team discussed this topic in detail during the first half of the meeting. The consensus was to move forward with the proposed approach after reviewing the risks and timeline constraints.'}`,
      sources: [
        { speaker: 'Alice', start_time: 142, text_preview: 'I think we need to finalise the budget allocation before end of week, otherwise the procurement process will be delayed...' },
        { speaker: 'Bob', start_time: 287, text_preview: 'Agreed. I can take ownership of the customer interviews — I have capacity starting Monday...' },
      ]
    };
  }

  return { query_type, output, thinking, steps: thinking.map(t=>t.step) };
}
